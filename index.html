<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dyc loves cmm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .heart {
            position: absolute;
            bottom: -50px;
            font-size: 20px;
            color: rgba(255, 100, 130, 0.6);
            animation: float-up 6s linear infinite;
        }

        .kitty {
            position: absolute;
            bottom: -80px;
            font-size: 40px;
            animation: float-up 8s linear infinite;
        }

        .hello-kitty-corner {
            position: fixed;
            font-size: 80px;
            z-index: 5;
            filter: drop-shadow(0 0 20px rgba(255, 150, 200, 0.5));
        }

        .kitty-left {
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
        }

        .kitty-right {
            right: 30px;
            top: 50%;
            transform: translateY(-50%) scaleX(-1);
        }

        .hello-kitty-svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
        }

        @keyframes float-up {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg) scale(0.5);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .main-heart {
            font-size: 120px;
            animation: heartbeat 1.2s ease-in-out infinite;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 30px rgba(255, 80, 120, 0.5));
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            14% {
                transform: scale(1.1);
            }
            28% {
                transform: scale(1);
            }
            42% {
                transform: scale(1.1);
            }
            70% {
                transform: scale(1);
            }
        }

        .title {
            font-size: 4rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ff4d6d, #ff758f, #ff9a8b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 4px 20px rgba(255, 77, 109, 0.3);
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.5rem;
            color: #ff6b8a;
            margin-top: 20px;
            opacity: 0.9;
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: sparkle 2s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%, 100% {
                opacity: 0;
                transform: scale(0);
            }
            50% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 600px) {
            .title {
                font-size: 2.5rem;
            }
            .main-heart {
                font-size: 80px;
            }
            .hello-kitty-corner {
                display: none;
            }
            .hello-kitty-svg {
                width: 70px;
                height: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>

    <div class="hello-kitty-corner kitty-left">🎀</div>
    <div class="hello-kitty-corner kitty-right">🎀</div>

    <div class="container">
        <svg class="hello-kitty-svg" viewBox="0 0 100 100">
            <ellipse cx="50" cy="58" rx="35" ry="33" fill="white" stroke="#ffb6c1" stroke-width="2"/>
            <circle cx="20" cy="30" r="12" fill="white" stroke="#ffb6c1" stroke-width="2"/>
            <circle cx="80" cy="30" r="12" fill="white" stroke="#ffb6c1" stroke-width="2"/>
            <line x1="5" y1="50" x2="25" y2="52" stroke="#333" stroke-width="2"/>
            <line x1="5" y1="60" x2="25" y2="60" stroke="#333" stroke-width="2"/>
            <line x1="5" y1="70" x2="25" y2="68" stroke="#333" stroke-width="2"/>
            <line x1="75" y1="52" x2="95" y2="50" stroke="#333" stroke-width="2"/>
            <line x1="75" y1="60" x2="95" y2="60" stroke="#333" stroke-width="2"/>
            <line x1="75" y1="68" x2="95" y2="70" stroke="#333" stroke-width="2"/>
            <ellipse cx="38" cy="55" rx="4" ry="5" fill="#333"/>
            <ellipse cx="62" cy="55" rx="4" ry="5" fill="#333"/>
            <circle cx="50" cy="62" r="5" fill="#ffb6c1"/>
            <ellipse cx="30" cy="68" rx="6" ry="4" fill="#ffb6c1" opacity="0.5"/>
            <ellipse cx="70" cy="68" rx="6" ry="4" fill="#ffb6c1" opacity="0.5"/>
            <circle cx="50" cy="25" r="8" fill="#ff69b4"/>
            <circle cx="42" cy="22" r="8" fill="#ff69b4"/>
            <circle cx="58" cy="22" r="8" fill="#ff69b4"/>
            <circle cx="50" cy="18" r="8" fill="#ff69b4"/>
            <circle cx="50" cy="25" r="4" fill="#ffb6c1"/>
        </svg>
        <div class="main-heart">❤️</div>
        <h1 class="title">dyc loves cmm</h1>
        <p class="subtitle">Forever & Always 💕</p>
    </div>

    <script>
        const kitties = ['🎀', '🐱', '💕', '🎀', '✨'];

        // 飘爱心效果
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            heart.style.animationDelay = Math.random() * 2 + 's';
            document.getElementById('hearts').appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 8000);
        }

        // 飘Hello Kitty效果
        function createKitty() {
            const kitty = document.createElement('div');
            kitty.className = 'kitty';
            kitty.innerHTML = kitties[Math.floor(Math.random() * kitties.length)];
            kitty.style.left = Math.random() * 100 + '%';
            kitty.style.fontSize = (Math.random() * 25 + 30) + 'px';
            kitty.style.animationDuration = (Math.random() * 4 + 6) + 's';
            kitty.style.animationDelay = Math.random() * 3 + 's';
            document.getElementById('hearts').appendChild(kitty);

            setTimeout(() => {
                kitty.remove();
            }, 10000);
        }

        // 创建闪光点
        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.top = Math.random() * 100 + '%';
            sparkle.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(sparkle);
        }

        // 初始化
        for (let i = 0; i < 15; i++) {
            setTimeout(createSparkle, i * 100);
        }

        setInterval(createHeart, 800);
        setInterval(createKitty, 2000);
    </script>
</body>
</html>
